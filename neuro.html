<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komple Nöro-Anatomi Simülatörü | Tüm Sinir Sistemi</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Vis.js Network -->
  <script src="https://unpkg.com/vis-network@latest/standalone/umd/vis-network.min.js"></script>
  
  <style>
    /* ── CYBER-MEDICAL THEME ── */
    :root {
      --bg-primary: #0a0a1f;
      --bg-secondary: #141428;
      --bg-tertiary: #1a1a2e;
      --bg-card: rgba(26, 26, 46, 0.8);
      --cns-color: #00ff88;
      --pns-color: #00d4ff;
      --sensory-color: #ff00ff;
      --motor-color: #ff6b35;
      --autonomic-color: #ffd700;
      --lesion-color: #ff3366;
      --inactive-color: #4a5568;
      --text-primary: #e2e8f0;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --border-color: #2d3748;
      --glow-cns: 0 0 25px rgba(0, 255, 136, 0.5);
      --glow-pns: 0 0 25px rgba(0, 212, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: rgba(10, 10, 31, 0.95);
      backdrop-filter: blur(15px);
      border-bottom: 2px solid var(--border-color);
      padding: 1.5rem 2rem;
      position: relative;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-content {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .main-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(45deg, var(--cns-color), var(--pns-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: var(--glow-cns);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── MAIN CONTAINER ── */
    .main-container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 2rem;
      height: calc(100vh - 140px);
    }

    /* ── NETWORK CONTAINER ── */
    .network-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .network-controls {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      backdrop-filter: blur(10px);
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .toggle-btn {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-btn.active {
      background: rgba(0, 255, 136, 0.2);
      border-color: var(--cns-color);
      color: var(--cns-color);
    }

    .network-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      flex: 1;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
    }

    #network {
      width: 100%;
      height: 100%;
    }

    /* ── INFO PANEL ── */
    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
    }

    .panel-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .panel-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--cns-color);
    }

    .structure-info {
      display: none;
    }

    .structure-info.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .structure-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .structure-type {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .structure-type.cns {
      background: rgba(0, 255, 136, 0.2);
      color: var(--cns-color);
      border: 1px solid var(--cns-color);
    }

    .structure-type.pns {
      background: rgba(0, 212, 255, 0.2);
      color: var(--pns-color);
      border: 1px solid var(--pns-color);
    }

    .structure-description {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.75rem 1rem;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid var(--cns-color);
      border-radius: 8px;
      color: var(--cns-color);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn:hover {
      background: rgba(0, 255, 136, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      transform: translateY(-2px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .main-container {
        grid-template-columns: 1fr;
        height: auto;
      }

      .network-container {
        height: 600px;
      }

      .info-panel {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        text-align: center;
      }

      .main-container {
        padding: 1rem;
      }

      .info-panel {
        grid-template-columns: 1fr;
      }

      .controls-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div>
        <h1 class="main-title">Komple Nöro-Anatomi Simülatörü</h1>
        <p class="subtitle">İnsan Sinir Sisteminin Topoğrafik Haritası</p>
      </div>
    </div>
  </header>

  <main class="main-container">
    <div class="network-section">
      <div class="network-controls">
        <button class="toggle-btn active" onclick="toggleView('cns')">MSS</button>
        <button class="toggle-btn active" onclick="toggleView('pns')">PSS</button>
        <button class="toggle-btn active" onclick="toggleView('cranial')">Kraniyal</button>
        <button class="toggle-btn active" onclick="toggleView('peripheral')">Periferik</button>
      </div>

      <div class="network-container">
        <div id="network"></div>
      </div>
    </div>

    <div class="info-panel">
      <div class="panel-card">
        <h3 class="panel-title">🧠 Sinir Sistemi Bilgisi</h3>
        <div id="structureInfo" class="structure-info">
          <div class="structure-name" id="structureName">--</div>
          <div class="structure-type" id="structureType">Seçilmemiş</div>
          <div class="structure-description" id="structureDescription">
            Ağdaki herhangi bir yapıya tıklayarak detaylı bilgi alın.
          </div>
        </div>
      </div>

      <div class="panel-card">
        <h3 class="panel-title">🎮 Kontroller</h3>
        <div class="controls-grid">
          <button class="btn" onclick="resetSimulation()">Sıfırla</button>
          <button class="btn" onclick="randomLesion()">Rastgele Lezyon</button>
          <button class="btn" onclick="focusBrain()">Beyne Odaklan</button>
          <button class="btn" onclick="focusSpinal()">Omuriliğe Odaklan</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // ── BASİT NÖRO-ANATOMİ VERİSİ ──
    const neuroData = {
      nodes: [
        // MERKEZİ SİNİR SİSTEMİ
        {id: 'brain', label: 'Beyin', type: 'cns', description: 'Merkezi sinir sisteminin ana kontrol merkezi', color: '#00ff88', size: 40},
        {id: 'cerebellum', label: 'Beyincik', type: 'cns', description: 'Motor koordinasyon ve denge', color: '#00ffaa', size: 35},
        {id: 'brainstem', label: 'Beyin Sapı', type: 'cns', description: 'Yaşamsal fonksiyonlar', color: '#00ffcc', size: 30},
        {id: 'spinal_cord', label: 'Omurilik', type: 'cns', description: 'Merkezi ve periferik sistem arası köprü', color: '#00ff88', size: 35},
        
        // KRANİYAL SİNİRLER
        {id: 'cn1', label: 'CN I Olfaktor', type: 'cranial', description: 'Koku alma', color: '#00d4ff', size: 25},
        {id: 'cn2', label: 'CN II Optik', type: 'cranial', description: 'Görme', color: '#00d4ff', size: 25},
        {id: 'cn3', label: 'CN III Okülomotor', type: 'cranial', description: 'Göz hareketleri', color: '#00d4ff', size: 25},
        {id: 'cn4', label: 'CN IV Troklear', type: 'cranial', description: 'Göz hareketleri', color: '#00d4ff', size: 25},
        {id: 'cn5', label: 'CN V Trigeminal', type: 'cranial', description: 'Yüz duyusu ve çiğneme', color: '#00d4ff', size: 25},
        {id: 'cn6', label: 'CN VI Abdusens', type: 'cranial', description: 'Göz hareketleri', color: '#00d4ff', size: 25},
        {id: 'cn7', label: 'CN VII Fasiyal', type: 'cranial', description: 'Yüz ifadesi', color: '#00d4ff', size: 25},
        {id: 'cn8', label: 'CN VIII Vestibulokoklear', type: 'cranial', description: 'İşitme ve denge', color: '#00d4ff', size: 25},
        {id: 'cn9', label: 'CN IX Glosofaringeal', type: 'cranial', description: 'Yutma ve tat', color: '#00d4ff', size: 25},
        {id: 'cn10', label: 'CN X Vagus', type: 'cranial', description: 'Otonom fonksiyonlar', color: '#00d4ff', size: 25},
        {id: 'cn11', label: 'CN XI Aksesuar', type: 'cranial', description: 'Boyun ve omuz kasları', color: '#00d4ff', size: 25},
        {id: 'cn12', label: 'CN XII Hipoglossal', type: 'cranial', description: 'Dil kasları', color: '#00d4ff', size: 25},
        
        // PERİFERİK SİNİRLER
        {id: 'brachial_plexus', label: 'Brachial Plexus', type: 'peripheral', description: 'Kol pleksusu', color: '#ff00ff', size: 30},
        {id: 'n_axillaris', label: 'N. Axillaris', type: 'peripheral', description: 'Omuz abduksiyonu', color: '#ff00ff', size: 25},
        {id: 'n_radialis', label: 'N. Radialis', type: 'peripheral', description: 'Bilek ve parmak ekstansiyonu', color: '#ff00ff', size: 25},
        {id: 'n_medianus', label: 'N. Medianus', type: 'peripheral', description: 'Ön kol pronasyonu ve el fleksiyonu', color: '#ff00ff', size: 25},
        {id: 'n_ulnaris', label: 'N. Ulnaris', type: 'peripheral', description: 'El içi kaslar', color: '#ff00ff', size: 25},
        
        {id: 'lumbar_plexus', label: 'Lumbar Plexus', type: 'peripheral', description: 'Lomber pleksus', color: '#ff00ff', size: 30},
        {id: 'n_femoralis', label: 'N. Femoralis', type: 'peripheral', description: 'Diz ekstansiyonu', color: '#ff00ff', size: 25},
        {id: 'sciatic_nerve', label: 'N. Ischiadicus', type: 'peripheral', description: 'Bacak posterior kas grubu', color: '#ff00ff', size: 25},
        {id: 'n_tibialis', label: 'N. Tibialis', type: 'peripheral', description: 'Ayak plantar fleksiyonu', color: '#ff00ff', size: 25},
        {id: 'n_peroneus', label: 'N. Peroneus', type: 'peripheral', description: 'Ayak dorsifleksiyonu', color: '#ff00ff', size: 25}
      ],
      
      edges: [
        // Beyin bağlantıları
        {from: 'brain', to: 'cerebellum', color: '#00ff88', width: 3},
        {from: 'brain', to: 'brainstem', color: '#00ff88', width: 3},
        {from: 'brainstem', to: 'spinal_cord', color: '#00ff88', width: 3},
        
        // Kraniyal sinir bağlantıları
        {from: 'brain', to: 'cn1', color: '#00d4ff', width: 2},
        {from: 'brain', to: 'cn2', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn3', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn4', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn5', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn6', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn7', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn8', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn9', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn10', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn11', color: '#00d4ff', width: 2},
        {from: 'brainstem', to: 'cn12', color: '#00d4ff', width: 2},
        
        // Periferik sinir bağlantıları
        {from: 'spinal_cord', to: 'brachial_plexus', color: '#ff00ff', width: 2},
        {from: 'brachial_plexus', to: 'n_axillaris', color: '#ff00ff', width: 1},
        {from: 'brachial_plexus', to: 'n_radialis', color: '#ff00ff', width: 1},
        {from: 'brachial_plexus', to: 'n_medianus', color: '#ff00ff', width: 1},
        {from: 'brachial_plexus', to: 'n_ulnaris', color: '#ff00ff', width: 1},
        
        {from: 'spinal_cord', to: 'lumbar_plexus', color: '#ff00ff', width: 2},
        {from: 'lumbar_plexus', to: 'n_femoralis', color: '#ff00ff', width: 1},
        {from: 'spinal_cord', to: 'sciatic_nerve', color: '#ff00ff', width: 2},
        {from: 'sciatic_nerve', to: 'n_tibialis', color: '#ff00ff', width: 1},
        {from: 'sciatic_nerve', to: 'n_peroneus', color: '#ff00ff', width: 1}
      ]
    };

    // ── GLOBAL DEĞİŞKENLER ──
    let network;
    let nodes;
    let edges;
    let currentLesions = new Set();
    let activeFilters = {
      cns: true,
      pns: true,
      cranial: true,
      peripheral: true
    };

    // ── AĞ OLUŞTURMA ──
    function initializeNetwork() {
      try {
        // Düğümleri oluştur
        const allNodes = neuroData.nodes.map(node => ({
          id: node.id,
          label: node.label,
          title: node.description,
          type: node.type,
          description: node.description,
          status: 'normal',
          color: {
            background: node.color,
            border: '#ffffff',
            highlight: {
              background: adjustBrightness(node.color, 20),
              border: '#ffffff'
            }
          },
          font: {
            color: '#ffffff',
            size: Math.max(10, Math.min(14, node.label.length * 0.8)),
            face: 'JetBrains Mono'
          },
          size: node.size,
          shape: node.type === 'cns' ? 'box' : (node.type === 'cranial' ? 'arrow' : 'dot'),
          borderWidth: 2,
          shadow: {
            enabled: true,
            color: node.color,
            size: 15,
            x: 0,
            y: 0
          }
        }));

        // Bağlantıları oluştur
        const allEdges = neuroData.edges.map(edge => ({
          from: edge.from,
          to: edge.to,
          color: edge.color,
          width: edge.width,
          smooth: {
            type: 'continuous',
            roundness: 0.2
          }
        }));

        nodes = new vis.DataSet(allNodes);
        edges = new vis.DataSet(allEdges);

        // Ağ yapılandırması
        const container = document.getElementById('network');
        const data = { nodes: nodes, edges: edges };
        
        const options = {
          physics: {
            enabled: true,
            barnesHut: {
              gravitationalConstant: -2000,
              centralGravity: 0.3,
              springLength: 120,
              springConstant: 0.04,
              damping: 0.09
            }
          },
          interaction: {
            hover: true,
            tooltipDelay: 200,
            dragNodes: true,
            dragView: true,
            zoomView: true
          },
          layout: {
            improvedLayout: true
          }
        };

        network = new vis.Network(container, data, options);

        // Olay dinleyicileri
        network.on('click', function(params) {
          if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);
            
            if (node.type === 'cranial' || node.type === 'peripheral') {
              toggleLesion(nodeId);
            }
            
            updateStructureInfo(nodeId);
          }
        });

        network.on('hoverNode', function(params) {
          if (params.nodes && params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);
            const cursor = (node.type === 'cranial' || node.type === 'peripheral') ? 'pointer' : 'default';
            network.canvas.body.container.style.cursor = cursor;
          }
        });

        network.on('blurNode', function() {
          network.canvas.body.container.style.cursor = 'default';
        });

      } catch (error) {
        console.error('Network initialization error:', error);
      }
    }

    // ── YARDIMCI FONKSİYONLAR ──
    function adjustBrightness(color, percent) {
      const num = parseInt(color.replace('#', ''), 16);
      const amt = Math.round(2.55 * percent);
      const R = (num >> 16) + amt;
      const G = (num >> 8 & 0x00FF) + amt;
      const B = (num & 0x0000FF) + amt;
      return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
        (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
        (B < 255 ? B < 1 ? 0 : B : 255))
        .toString(16).slice(1);
    }

    // ── LEZYON MEKANİZMASI ──
    function toggleLesion(nodeId) {
      const node = nodes.get(nodeId);
      
      if (node.status === 'normal') {
        createLesion(nodeId);
      } else {
        clearLesion(nodeId);
      }
    }

    function createLesion(nodeId) {
      nodes.update({
        id: nodeId,
        status: 'lesioned',
        color: {
          background: '#ff3366',
          border: '#ffffff',
          highlight: {
            background: '#ff4477',
            border: '#ffffff'
          }
        },
        shadow: {
          enabled: true,
          color: '#ff3366',
          size: 20
        }
      });

      currentLesions.add(nodeId);
    }

    function clearLesion(nodeId) {
      const originalNode = neuroData.nodes.find(n => n.id === nodeId);
      
      nodes.update({
        id: nodeId,
        status: 'normal',
        color: {
          background: originalNode.color,
          border: '#ffffff',
          highlight: {
            background: adjustBrightness(originalNode.color, 20),
            border: '#ffffff'
          }
        },
        shadow: {
          enabled: true,
          color: originalNode.color,
          size: 15
        }
      });

      currentLesions.delete(nodeId);
    }

    // ── BİLGİ PANELİ GÜNCELLEME ──
    function updateStructureInfo(nodeId) {
      const nodeData = neuroData.nodes.find(n => n.id === nodeId);
      const node = nodes.get(nodeId);
      
      if (!nodeData) return;
      
      document.getElementById('structureInfo').classList.add('active');
      document.getElementById('structureName').textContent = nodeData.label;
      document.getElementById('structureDescription').textContent = nodeData.description;
      
      // Tür etiketi
      const typeElement = document.getElementById('structureType');
      typeElement.textContent = nodeData.type.toUpperCase();
      typeElement.className = `structure-type ${nodeData.type.includes('cns') ? 'cns' : 'pns'}`;
    }

    // ── KONTROL FONKSİYONLARI ──
    function resetSimulation() {
      currentLesions.forEach(lesionId => {
        clearLesion(lesionId);
      });
      currentLesions.clear();
    }

    function randomLesion() {
      const peripheralNodes = neuroData.nodes.filter(n => n.type === 'cranial' || n.type === 'peripheral');
      if (peripheralNodes.length > 0) {
        const randomNode = peripheralNodes[Math.floor(Math.random() * peripheralNodes.length)];
        
        // Önceki lezyonları temizle
        currentLesions.forEach(lesionId => {
          clearLesion(lesionId);
        });
        currentLesions.clear();
        
        // Yeni lezyon oluştur
        createLesion(randomNode.id);
        updateStructureInfo(randomNode.id);
      }
    }

    function focusBrain() {
      const brainNodes = neuroData.nodes.filter(n => n.type === 'cns').map(n => n.id);
      if (brainNodes.length > 0 && network) {
        network.selectNodes(brainNodes);
        network.fit({
          nodes: brainNodes,
          animation: {
            duration: 1000,
            easingFunction: 'easeInOutQuad'
          }
        });
      }
    }

    function focusSpinal() {
      const spinalNodes = ['spinal_cord', 'brachial_plexus', 'lumbar_plexus', 'sciatic_nerve'];
      if (network) {
        network.selectNodes(spinalNodes);
        network.fit({
          nodes: spinalNodes,
          animation: {
            duration: 1000,
            easingFunction: 'easeInOutQuad'
          }
        });
      }
    }

    function toggleView(viewType) {
      activeFilters[viewType] = !activeFilters[viewType];
      
      // Buton durumunu güncelle
      event.target.classList.toggle('active');
      
      // Düğümleri filtrele
      const allNodes = nodes.get();
      const filteredNodes = allNodes.map(node => {
        let shouldShow = false;
        
        if (node.type === 'cns' && activeFilters.cns) shouldShow = true;
        if (node.type === 'cranial' && activeFilters.cranial) shouldShow = true;
        if (node.type === 'peripheral' && activeFilters.peripheral) shouldShow = true;
        
        return {
          ...node,
          hidden: !shouldShow
        };
      });
      
      nodes.update(filteredNodes);
    }

    // ── BAŞLATMA ──
    document.addEventListener('DOMContentLoaded', function() {
      try {
        console.log('Initializing network...');
        initializeNetwork();
        console.log('Network initialized successfully');
        
        // Başlangıçta beyin yapısına odaklan
        setTimeout(() => {
          try {
            focusBrain();
          } catch (error) {
            console.error('Focus error:', error);
          }
        }, 1000);
      } catch (error) {
        console.error('Initialization error:', error);
      }
    });
  </script>
</body>
</html>
