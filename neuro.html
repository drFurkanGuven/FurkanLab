<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nöro-Lezyon Bilgi Kartı | Klinik Nöroloji</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ── MEDICAL THEME ── */
    :root {
      --bg-primary: #0a0a1f;
      --bg-secondary: #141428;
      --bg-card: rgba(26, 26, 46, 0.9);
      --lesion-color: #ff3366;
      --normal-color: #00ff88;
      --warning-color: #ffd700;
      --text-primary: #e2e8f0;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --border-color: #2d3748;
      --shadow-lesion: 0 0 30px rgba(255, 51, 102, 0.3);
      --shadow-normal: 0 0 30px rgba(0, 255, 136, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: rgba(10, 10, 31, 0.95);
      backdrop-filter: blur(15px);
      border-bottom: 2px solid var(--border-color);
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 100;
    }

    .title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(45deg, var(--normal-color), var(--lesion-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.2rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── MAIN CONTAINER ── */
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    /* ── NERVE GRID ── */
    .nerve-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .nerve-card {
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .nerve-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--normal-color), var(--lesion-color));
      transition: height 0.3s ease;
    }

    .nerve-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-normal);
      border-color: var(--normal-color);
    }

    .nerve-card.lesioned {
      border-color: var(--lesion-color);
      background: rgba(255, 51, 102, 0.1);
    }

    .nerve-card.lesioned::before {
      height: 100%;
      background: linear-gradient(180deg, rgba(255, 51, 102, 0.1), transparent);
    }

    .nerve-card.lesioned:hover {
      box-shadow: var(--shadow-lesion);
    }

    .nerve-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .nerve-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: rgba(0, 255, 136, 0.2);
      color: var(--normal-color);
      border: 2px solid var(--normal-color);
      transition: all 0.3s ease;
    }

    .nerve-card.lesioned .nerve-icon {
      background: rgba(255, 51, 102, 0.2);
      color: var(--lesion-color);
      border-color: var(--lesion-color);
    }

    .nerve-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .nerve-type {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .nerve-type.cranial {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      border: 1px solid #00d4ff;
    }

    .nerve-type.peripheral {
      background: rgba(255, 0, 255, 0.2);
      color: #ff00ff;
      border: 1px solid #ff00ff;
    }

    .nerve-type.spinal {
      background: rgba(0, 255, 136, 0.2);
      color: var(--normal-color);
      border: 1px solid var(--normal-color);
    }

    .nerve-description {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .nerve-functions {
      margin-bottom: 1.5rem;
    }

    .function-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .function-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .function-tag {
      padding: 0.3rem 0.6rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .function-tag:hover {
      background: rgba(0, 255, 136, 0.2);
      border-color: var(--normal-color);
      color: var(--normal-color);
    }

    /* ── CLINICAL SECTION ── */
    .clinical-section {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      transition: all 0.3s ease;
    }

    .nerve-card.lesioned .clinical-section {
      background: rgba(255, 51, 102, 0.1);
      border-color: var(--lesion-color);
    }

    .clinical-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--warning-color);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .clinical-title i {
      font-size: 1.1rem;
    }

    .clinical-symptoms {
      display: grid;
      gap: 0.8rem;
    }

    .symptom-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 0.8rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border-left: 3px solid var(--lesion-color);
    }

    .symptom-icon {
      color: var(--lesion-color);
      font-size: 1rem;
      margin-top: 0.2rem;
    }

    .symptom-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .symptom-severity {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      margin-left: auto;
      background: rgba(255, 51, 102, 0.2);
      color: var(--lesion-color);
    }

    /* ── STATUS BAR ── */
    .status-bar {
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .status-group {
      text-align: center;
    }

    .status-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--normal-color);
      margin-bottom: 0.5rem;
    }

    .status-value.lesioned {
      color: var(--lesion-color);
    }

    .status-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── CONTROLS ── */
    .controls {
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 3rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .control-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--normal-color), #00cc66);
      border: none;
      border-radius: 8px;
      color: var(--bg-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.3);
    }

    .btn.danger {
      background: linear-gradient(135deg, var(--lesion-color), #cc1144);
    }

    .btn.danger:hover {
      box-shadow: 0 8px 25px rgba(255, 51, 102, 0.3);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .title {
        font-size: 2rem;
      }

      .main-container {
        padding: 2rem 1rem;
      }

      .nerve-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .status-bar {
        flex-direction: column;
        gap: 1.5rem;
      }

      .control-buttons {
        flex-direction: column;
      }
    }

    /* ── ANIMATIONS ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .nerve-card {
      animation: slideIn 0.6s ease forwards;
    }

    .nerve-card:nth-child(1) { animation-delay: 0.1s; }
    .nerve-card:nth-child(2) { animation-delay: 0.2s; }
    .nerve-card:nth-child(3) { animation-delay: 0.3s; }
    .nerve-card:nth-child(4) { animation-delay: 0.4s; }
    .nerve-card:nth-child(5) { animation-delay: 0.5s; }
    .nerve-card:nth-child(6) { animation-delay: 0.6s; }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">Nöro-Lezyon Bilgi Kartı</h1>
    <p class="subtitle">Klinik Nöroloji ve Lezyon Simülasyonu</p>
  </header>

  <main class="main-container">
    <!-- DURUM BAR -->
    <section class="status-bar">
      <div class="status-group">
        <div class="status-value" id="normalCount">0</div>
        <div class="status-label">Normal Sinir</div>
      </div>
      <div class="status-group">
        <div class="status-value lesioned" id="lesionedCount">0</div>
        <div class="status-label">Lezyonlu Sinir</div>
      </div>
      <div class="status-group">
        <div class="status-value" id="totalSymptoms">0</div>
        <div class="status-label">Toplam Semptom</div>
      </div>
    </section>

    <!-- SİNİR KARTLARI -->
    <section class="nerve-grid" id="nerveGrid">
      <!-- Kartlar JavaScript ile oluşturulacak -->
    </section>

    <!-- KONTROLLER -->
    <section class="controls">
      <div class="control-buttons">
        <button class="btn" onclick="resetAllLesions()">
          <i class="fas fa-sync-alt"></i> Tümünü Sıfırla
        </button>
        <button class="btn" onclick="randomLesion()">
          <i class="fas fa-random"></i> Rastgele Lezyon
        </button>
        <button class="btn danger" onclick="showAllLesions()">
          <i class="fas fa-exclamation-triangle"></i> Tüm Lezyonları Göster
        </button>
      </div>
    </section>
  </main>

  <script>
    // ── NÖROLOJİK VERİ TABANI ──
    const nerveData = [
      {
        id: 'n_axillaris',
        name: 'N. Axillaris',
        type: 'peripheral',
        icon: 'fas fa-brain',
        description: 'Koltuk altı siniri, omuz abduksiyonundan sorumlu.',
        functions: ['Omuz abduksiyonu', 'Omuz dış rotasyonu', 'Deltoid kası'],
        clinical: {
          symptoms: [
            { text: 'Omuz abduksiyonu zayıflığı', severity: 'Şiddetli' },
            { text: 'Deltoid kası atrofisi', severity: 'Orta' },
            { text: 'Omuz dış rotasyonu kısıtlılığı', severity: 'Hafif' }
          ],
          syndrome: 'Axiller Nöropati'
        }
      },
      {
        id: 'n_radialis',
        name: 'N. Radialis',
        type: 'peripheral',
        icon: 'fas fa-hand-paper',
        description: 'Radius siniri, ön kol posterior kas grubunu innerve eder.',
        functions: ['Triceps', 'Bilek ekstansiyonu', 'Parmak ekstansiyonu', 'Ön kol supinasyonu'],
        clinical: {
          symptoms: [
            { text: 'Wrist drop (düşük el)', severity: 'Şiddetli' },
            { text: 'Parmak ekstansiyonu zayıflığı', severity: 'Şiddetli' },
            { text: 'Triceps refleksi kaybı', severity: 'Orta' },
            { text: 'Sensory deficit posterior forearm', severity: 'Hafif' }
          ],
          syndrome: 'Radial Nöropati'
        }
      },
      {
        id: 'n_medianus',
        name: 'N. Medianus',
        type: 'peripheral',
        icon: 'fas fa-hand-rock',
        description: 'Median sinir, ön kol anterior kaslarını ve el içi kaslarını innerve eder.',
        functions: ['Ön kol pronasyonu', 'Bilek fleksiyonu', 'Parmak fleksiyonu', 'El içi kasları'],
        clinical: {
          symptoms: [
            { text: 'Maymun el deformitesi', severity: 'Şiddetli' },
            { text: 'Thenar atrofisi', severity: 'Orta' },
            { text: 'Karpal tünel sendromu', severity: 'Değişken' },
            { text: 'Sensory deficit thumb-index-middle', severity: 'Hafif' }
          ],
          syndrome: 'Median Nöropati'
        }
      },
      {
        id: 'n_ulnaris',
        name: 'N. Ulnaris',
        type: 'peripheral',
        icon: 'fas fa-hand-spock',
        description: 'Ulnar sinir, el içi kaslarını ve ulnar fleksörleri innerve eder.',
        functions: ['El içi kasları', 'Ulnar fleksiyon', 'Parmak abduksiyonu'],
        clinical: {
          symptoms: [
            { text: 'Claw hand (pençe el)', severity: 'Şiddetli' },
            { text: 'İnterosseoz kas atrofisi', severity: 'Orta' },
            { text: 'El medial uyuşukluğu', severity: 'Hafif' },
            { text: 'Başparmak adduksiyonu zayıflığı', severity: 'Orta' }
          ],
          syndrome: 'Ulnar Nöropati'
        }
      },
      {
        id: 'n_femoralis',
        name: 'N. Femoralis',
        type: 'peripheral',
        icon: 'fas fa-walking',
        description: 'Femoral sinir, ön uyluk kaslarını ve diz ekstansiyonunu innerve eder.',
        functions: ['Diz ekstansiyonu', 'Kalça fleksiyonu', 'Kuadriseps kası'],
        clinical: {
          symptoms: [
            { text: 'Diz ekstansiyonu zayıflığı', severity: 'Şiddetli' },
            { text: 'Patellar refleksi kaybı', severity: 'Orta' },
            { text: 'Ön uyluk uyuşukluğu', severity: 'Hafif' },
            { text: 'Kalça fleksiyonu kısıtlılığı', severity: 'Hafif' }
          ],
          syndrome: 'Femoral Nöropati'
        }
      },
      {
        id: 'n_ischiadicus',
        name: 'N. Ischiadicus',
        type: 'peripheral',
        icon: 'fas fa-bone',
        description: 'İsiatik sinir, bacak posterior kas grubunu innerve eder.',
        functions: ['Bacak posterior kas grubu', 'Diz fleksiyonu', 'Ayak plantar fleksiyonu'],
        clinical: {
          symptoms: [
            { text: 'İsiatik ağrı', severity: 'Şiddetli' },
            { text: 'Bacak posterior grup zayıflığı', severity: 'Orta' },
            { text: 'Ayak dorsifleksiyonu zayıflığı', severity: 'Orta' },
            { text: 'Achilles refleksi değişikliği', severity: 'Hafif' }
          ],
          syndrome: 'İsiatik Nöropati'
        }
      },
      {
        id: 'cn7',
        name: 'CN VII - Fasiyal',
        type: 'cranial',
        icon: 'fas fa-smile',
        description: 'Fasiyal sinir, yüz ifadesi kaslarını innerve eder.',
        functions: ['Yüz ifadesi', 'Göz kapağı kapatma', 'Ağız hareketleri', 'Tat alma (anterior 2/3)'],
        clinical: {
          symptoms: [
            { text: 'Yüz felci (periferik)', severity: 'Şiddetli' },
            { text: 'Ağız deviyasyonu', severity: 'Orta' },
            { text: 'Göz kapağı kapatamama', severity: 'Hafif' },
            { text: 'Tat kaybı (anterior dil)', severity: 'Hafif' }
          ],
          syndrome: 'Fasiyal Paralizi'
        }
      },
      {
        id: 'cn5',
        name: 'CN V - Trigeminal',
        type: 'cranial',
        icon: 'fas fa-theater-masks',
        description: 'Trigeminal sinir, yüz duyusunu ve çiğneme kaslarını innerve eder.',
        functions: ['Yüz duyusu', 'Çiğneme kasları', 'Çene hareketleri'],
        clinical: {
          symptoms: [
            { text: 'Trigeminal nevralji', severity: 'Şiddetli' },
            { text: 'Yüz duyusu kaybı', severity: 'Orta' },
            { text: 'Çiğneme güçlüğü', severity: 'Hafif' },
            { text: 'Masseter kası zayıflığı', severity: 'Hafif' }
          ],
          syndrome: 'Trigeminal Nevralji'
        }
      },
      {
        id: 'cn8',
        name: 'CN VIII - Vestibulokoklear',
        type: 'cranial',
        icon: 'fas fa-headphones',
        description: 'Vestibulokoklear sinir, işitmeyi ve dengeyi kontrol eder.',
        functions: ['İşitme', 'Denge', 'Vestibüler sistem'],
        clinical: {
          symptoms: [
            { text: 'İşitme kaybı', severity: 'Şiddetli' },
            { text: 'Vertigo', severity: 'Şiddetli' },
            { text: 'Tinnitus', severity: 'Orta' },
            { text: 'Nistagmus', severity: 'Hafif' }
          ],
          syndrome: 'Vestibulokoklear Nöropati'
        }
      }
    ];

    // ── GLOBAL DEĞİŞKENLER ──
    let lesionedNerves = new Set();

    // ── KART OLUŞTURMA ──
    function createNerveCards() {
      const grid = document.getElementById('nerveGrid');
      grid.innerHTML = '';

      nerveData.forEach((nerve, index) => {
        const card = document.createElement('div');
        card.className = 'nerve-card';
        card.id = `card-${nerve.id}`;
        card.onclick = () => toggleLesion(nerve.id);

        const isLesioned = lesionedNerves.has(nerve.id);
        if (isLesioned) {
          card.classList.add('lesioned');
        }

        card.innerHTML = `
          <div class="nerve-header">
            <div class="nerve-icon">
              <i class="${nerve.icon}"></i>
            </div>
            <div class="nerve-title">${nerve.name}</div>
          </div>
          
          <div class="nerve-type ${nerve.type}">${nerve.type === 'cranial' ? 'Kraniyal Sinir' : 'Periferik Sinir'}</div>
          
          <div class="nerve-description">${nerve.description}</div>
          
          <div class="nerve-functions">
            <div class="function-title">Fonksiyonlar:</div>
            <div class="function-list">
              ${nerve.functions.map(func => `<span class="function-tag">${func}</span>`).join('')}
            </div>
          </div>
          
          <div class="clinical-section">
            <div class="clinical-title">
              <i class="fas fa-exclamation-triangle"></i>
              ${isLesioned ? 'Aktif Klinik Tablo' : 'Lezyon Durumunda Klinik Tablo'}
            </div>
            <div class="clinical-symptoms">
              ${nerve.clinical.symptoms.map(symptom => `
                <div class="symptom-item">
                  <div class="symptom-icon">
                    <i class="fas fa-${isLesioned ? 'times-circle' : 'info-circle'}"></i>
                  </div>
                  <div class="symptom-text">${symptom.text}</div>
                  <div class="symptom-severity">${symptom.severity}</div>
                </div>
              `).join('')}
            </div>
            <div style="margin-top: 1rem; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border-radius: 8px;">
              <strong style="color: var(--warning-color);">Sendrom:</strong> ${nerve.clinical.syndrome}
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      updateStatus();
    }

    // ── LEZYON MEKANİZMASI ──
    function toggleLesion(nerveId) {
      const card = document.getElementById(`card-${nerveId}`);
      
      if (lesionedNerves.has(nerveId)) {
        lesionedNerves.delete(nerveId);
        card.classList.remove('lesioned');
      } else {
        lesionedNerves.add(nerveId);
        card.classList.add('lesioned');
      }

      // Kartı yeniden oluştur (güncellenmiş klinik bilgilerle)
      createNerveCards();
    }

    // ── DURUM GÜNCELLEME ──
    function updateStatus() {
      const normalCount = nerveData.length - lesionedNerves.size;
      const lesionedCount = lesionedNerves.size;
      
      let totalSymptoms = 0;
      lesionedNerves.forEach(nerveId => {
        const nerve = nerveData.find(n => n.id === nerveId);
        if (nerve) {
          totalSymptoms += nerve.clinical.symptoms.length;
        }
      });

      document.getElementById('normalCount').textContent = normalCount;
      document.getElementById('lesionedCount').textContent = lesionedCount;
      document.getElementById('totalSymptoms').textContent = totalSymptoms;
    }

    // ── KONTROL FONKSİYONLARI ──
    function resetAllLesions() {
      lesionedNerves.clear();
      createNerveCards();
    }

    function randomLesion() {
      resetAllLesions();
      const randomNerve = nerveData[Math.floor(Math.random() * nerveData.length)];
      lesionedNerves.add(randomNerve.id);
      createNerveCards();
    }

    function showAllLesions() {
      nerveData.forEach(nerve => {
        lesionedNerves.add(nerve.id);
      });
      createNerveCards();
    }

    // ── BAŞLATMA ──
    document.addEventListener('DOMContentLoaded', function() {
      createNerveCards();
    });
  </script>
</body>
</html>
