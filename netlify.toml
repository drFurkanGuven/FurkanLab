[build]
  publish = "."
  command = "npm install && export DATABASE_URL=\"$NETLIFY_DATABASE_URL\" && npx prisma generate && (npx prisma db push --accept-data-loss || echo 'DB push skipped – will use existing schema') && (node scripts/seed-quran.js || echo 'Seeding skipped – data already exists')"

[functions]
  directory = "netlify/functions"
  included_files = ["node_modules/.prisma/**", "prisma/schema.prisma"]

# ── Performans: Tarayıcı Önbellekleme (Cache) ──
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth-register"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200
  
[[redirects]]
  from = "/api/event-detail"
  to = "/.netlify/functions/event-detail"
  status = 200

[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/events"
  status = 200

[[redirects]]
  from = "/api/events/:id"
  to = "/.netlify/functions/event-detail?id=:id"
  status = 200

[[redirects]]
  from = "/api/progress"
  to = "/.netlify/functions/progress"
  status = 200

[[redirects]]
  from = "/api/progress/:eventId"
  to = "/.netlify/functions/progress-list?eventId=:eventId"
  status = 200

[[redirects]]
  from = "/api/kuran/search"
  to = "/.netlify/functions/kuran-search"
  status = 200

[[redirects]]
  from = "/api/kuran/enhanced-search"
  to = "/.netlify/functions/kuran-enhanced-search"
  status = 200

[[redirects]]
  from = "/api/kuran/wbw"
  to = "/.netlify/functions/kuran-wbw"
  status = 200
